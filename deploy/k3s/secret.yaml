# bible dictionary Secret
# 敏感配置信息（密码等）
# 注意：生产环境应使用 External Secrets 或 Sealed Secrets
apiVersion: v1
kind: Secret
metadata:
  name: bible dictionary-secret
  namespace: default
  labels:
    app: bible dictionary
type: Opaque
stringData:
  # 数据库密码（明文，部署时会自动 base64 编码）
  DB_PASSWORD: "bible dictionary123"
