<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <!-- 羊皮纸底色渐变 -->
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b896"/>
      <stop offset="30%" style="stop-color:#e8d5b7"/>
      <stop offset="60%" style="stop-color:#f0e4ce"/>
      <stop offset="100%" style="stop-color:#d9c4a0"/>
    </linearGradient>
    <!-- 暗角晕影 -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="70%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:rgba(60,40,20,0.45)"/>
    </radialGradient>
    <!-- 中心微光 -->
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#f5edd8;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#f5edd8;stop-opacity:0"/>
    </radialGradient>
    <!-- 卷轴端头渐变 -->
    <linearGradient id="scrollEnd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6914"/>
      <stop offset="30%" style="stop-color:#c9a045"/>
      <stop offset="50%" style="stop-color:#dab85c"/>
      <stop offset="70%" style="stop-color:#c9a045"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
    <!-- 卷轴木杆 -->
    <linearGradient id="rod" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b4423"/>
      <stop offset="30%" style="stop-color:#8b6240"/>
      <stop offset="50%" style="stop-color:#9b7250"/>
      <stop offset="70%" style="stop-color:#8b6240"/>
      <stop offset="100%" style="stop-color:#5a3518"/>
    </linearGradient>
    <filter id="paperTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#3c2814" flood-opacity="0.3"/>
    </filter>
    <filter id="inkBleed">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- 深色底层背景 -->
  <rect width="1200" height="600" fill="#2c1e10"/>

  <!-- 羊皮纸主体 -->
  <rect x="60" y="30" width="1080" height="540" rx="3" fill="url(#parchment)" filter="url(#softShadow)"/>

  <!-- 纸张纹理叠加 -->
  <rect x="60" y="30" width="1080" height="540" rx="3" fill="url(#parchment)" filter="url(#paperTexture)" opacity="0.85"/>

  <!-- 中心微光 -->
  <rect x="60" y="30" width="1080" height="540" rx="3" fill="url(#centerGlow)"/>

  <!-- 暗角晕影 -->
  <rect width="1200" height="600" fill="url(#vignette)"/>

  <!-- 左侧卷轴 -->
  <g transform="translate(55, 300)">
    <!-- 卷曲阴影 -->
    <ellipse cx="12" cy="0" rx="12" ry="275" fill="#3c2814" opacity="0.15"/>
    <!-- 卷曲边缘 -->
    <ellipse cx="5" cy="0" rx="8" ry="270" fill="#c4a97a"/>
    <ellipse cx="5" cy="0" rx="5" ry="270" fill="#d4b896"/>
    <!-- 木杆 -->
    <rect x="-4" y="-285" width="8" height="570" rx="4" fill="url(#rod)"/>
    <!-- 杆头装饰 -->
    <circle cx="0" cy="-285" r="8" fill="url(#scrollEnd)"/>
    <circle cx="0" cy="285" r="8" fill="url(#scrollEnd)"/>
    <circle cx="0" cy="-285" r="4" fill="#f0d080"/>
    <circle cx="0" cy="285" r="4" fill="#f0d080"/>
  </g>

  <!-- 右侧卷轴 -->
  <g transform="translate(1145, 300)">
    <ellipse cx="-12" cy="0" rx="12" ry="275" fill="#3c2814" opacity="0.15"/>
    <ellipse cx="-5" cy="0" rx="8" ry="270" fill="#c4a97a"/>
    <ellipse cx="-5" cy="0" rx="5" ry="270" fill="#d4b896"/>
    <rect x="-4" y="-285" width="8" height="570" rx="4" fill="url(#rod)"/>
    <circle cx="0" cy="-285" r="8" fill="url(#scrollEnd)"/>
    <circle cx="0" cy="285" r="8" fill="url(#scrollEnd)"/>
    <circle cx="0" cy="-285" r="4" fill="#f0d080"/>
    <circle cx="0" cy="285" r="4" fill="#f0d080"/>
  </g>

  <!-- 装饰性边框线 -->
  <rect x="90" y="55" width="1020" height="490" rx="2" fill="none" stroke="#a08050" stroke-width="0.8" opacity="0.3"/>
  <rect x="95" y="60" width="1010" height="480" rx="2" fill="none" stroke="#a08050" stroke-width="0.4" opacity="0.2"/>

  <!-- 四角装饰花纹 -->
  <g opacity="0.25" fill="#7a5c30">
    <!-- 左上角 -->
    <g transform="translate(95, 60)">
      <path d="M0,0 Q15,5 20,20 Q5,15 0,0Z"/>
      <path d="M0,0 Q5,15 20,20" fill="none" stroke="#7a5c30" stroke-width="0.8"/>
      <circle cx="12" cy="12" r="2"/>
    </g>
    <!-- 右上角 -->
    <g transform="translate(1105, 60) scale(-1,1)">
      <path d="M0,0 Q15,5 20,20 Q5,15 0,0Z"/>
      <path d="M0,0 Q5,15 20,20" fill="none" stroke="#7a5c30" stroke-width="0.8"/>
      <circle cx="12" cy="12" r="2"/>
    </g>
    <!-- 左下角 -->
    <g transform="translate(95, 540) scale(1,-1)">
      <path d="M0,0 Q15,5 20,20 Q5,15 0,0Z"/>
      <path d="M0,0 Q5,15 20,20" fill="none" stroke="#7a5c30" stroke-width="0.8"/>
      <circle cx="12" cy="12" r="2"/>
    </g>
    <!-- 右下角 -->
    <g transform="translate(1105, 540) scale(-1,-1)">
      <path d="M0,0 Q15,5 20,20 Q5,15 0,0Z"/>
      <path d="M0,0 Q5,15 20,20" fill="none" stroke="#7a5c30" stroke-width="0.8"/>
      <circle cx="12" cy="12" r="2"/>
    </g>
  </g>

  <!-- 古代希伯来/希腊文字装饰（淡化背景文字） -->
  <g opacity="0.06" fill="#5a4020" filter="url(#inkBleed)">
    <!-- 左侧区域文字行 -->
    <text x="130" y="120" font-family="serif" font-size="13">בְּרֵאשִׁית בָּרָא אֱלֹהִים אֵת הַשָּׁמַיִם וְאֵת הָאָרֶץ</text>
    <text x="130" y="145" font-family="serif" font-size="13">וְהָאָרֶץ הָיְתָה תֹהוּ וָבֹהוּ וְחֹשֶׁךְ עַל־פְּנֵי תְהוֹם</text>
    <text x="130" y="170" font-family="serif" font-size="13">וְרוּחַ אֱלֹהִים מְרַחֶפֶת עַל־פְּנֵי הַמָּיִם</text>
    <text x="130" y="195" font-family="serif" font-size="13">וַיֹּאמֶר אֱלֹהִים יְהִי אוֹר וַיְהִי־אוֹר</text>

    <!-- 右侧区域文字行 -->
    <text x="650" y="120" font-family="serif" font-size="13">Ἐν ἀρχῇ ἦν ὁ λόγος καὶ ὁ λόγος ἦν πρὸς τὸν θεόν</text>
    <text x="650" y="145" font-family="serif" font-size="13">καὶ θεὸς ἦν ὁ λόγος οὗτος ἦν ἐν ἀρχῇ πρὸς τὸν θεόν</text>
    <text x="650" y="170" font-family="serif" font-size="13">πάντα δι᾽ αὐτοῦ ἐγένετο καὶ χωρὶς αὐτοῦ ἐγένετο</text>
    <text x="650" y="195" font-family="serif" font-size="13">οὐδὲ ἕν ὃ γέγονεν ἐν αὐτῷ ζωὴ ἦν</text>

    <!-- 中下区域 -->
    <text x="200" y="420" font-family="serif" font-size="12">כִּי כֹה אָהַב אֱלֹהִים אֶת הָעוֹלָם עַד אֲשֶׁר נָתַן אֶת בְּנוֹ</text>
    <text x="200" y="445" font-family="serif" font-size="12">הַיָּחִיד לְמַעַן לֹא יֹאבַד כָּל הַמַּאֲמִין בּוֹ</text>
    <text x="600" y="420" font-family="serif" font-size="12">οὕτως γὰρ ἠγάπησεν ὁ θεὸς τὸν κόσμον ὥστε</text>
    <text x="600" y="445" font-family="serif" font-size="12">τὸν υἱὸν τὸν μονογενῆ ἔδωκεν</text>
    <text x="200" y="475" font-family="serif" font-size="12">אֶלָּא יִהְיֶה לוֹ חַיֵּי עוֹלָם</text>
    <text x="600" y="475" font-family="serif" font-size="12">ἵνα πᾶς ὁ πιστεύων εἰς αὐτὸν μὴ ἀπόληται</text>
  </g>

  <!-- 中央十字架装饰 -->
  <g transform="translate(600, 300)" opacity="0.08">
    <rect x="-2" y="-80" width="4" height="160" rx="1" fill="#5a3518"/>
    <rect x="-40" y="-45" width="80" height="4" rx="1" fill="#5a3518"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#5a3518" stroke-width="0.8"/>
  </g>

  <!-- 磨损/老化痕迹 -->
  <g opacity="0.04">
    <circle cx="200" cy="150" r="40" fill="#3c2814"/>
    <circle cx="900" cy="450" r="50" fill="#3c2814"/>
    <circle cx="1000" cy="100" r="30" fill="#3c2814"/>
    <circle cx="150" cy="500" r="35" fill="#3c2814"/>
    <ellipse cx="600" cy="300" rx="80" ry="40" fill="#f5edd8"/>
  </g>
</svg>
