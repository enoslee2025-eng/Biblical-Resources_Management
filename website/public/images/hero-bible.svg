<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="50%" style="stop-color:#1a2f42"/>
      <stop offset="100%" style="stop-color:#243b53"/>
    </linearGradient>
    <radialGradient id="topglow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="pageL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8dcc8"/>
      <stop offset="100%" style="stop-color:#f5efe3"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5efe3"/>
      <stop offset="100%" style="stop-color:#e8dcc8"/>
    </linearGradient>
    <linearGradient id="cover" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c3a1e"/>
      <stop offset="100%" style="stop-color:#3d2510"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 深色背景 -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#topglow)"/>

  <!-- 从上方洒下的光线 -->
  <g opacity="0.04">
    <polygon points="600,0 480,600 520,600" fill="#c9a96e"/>
    <polygon points="600,0 560,600 600,600" fill="#c9a96e"/>
    <polygon points="600,0 640,600 680,600" fill="#c9a96e"/>
    <polygon points="600,0 720,600 760,600" fill="#c9a96e"/>
  </g>

  <!-- ============ 翻开的圣经 ============ -->
  <g transform="translate(600, 310)" filter="url(#shadow)">

    <!-- 书封底（棕色皮革） -->
    <path d="M-220,30 Q-220,-10 -210,-40 L-200,-90 Q-5,-110 0,-100 Q5,-110 200,-90 L210,-40 Q220,-10 220,30 L220,110 Q220,130 200,125 Q5,105 0,110 Q-5,105 -200,125 Q-220,130 -220,110 Z" fill="url(#cover)" opacity="0.9"/>

    <!-- 左页 -->
    <path d="M-6,-95 Q-100,-105 -185,-85 Q-200,-80 -205,-50 L-205,100 Q-205,115 -185,110 Q-100,95 -6,100 Z" fill="url(#pageL)"/>

    <!-- 右页 -->
    <path d="M6,-95 Q100,-105 185,-85 Q200,-80 205,-50 L205,100 Q205,115 185,110 Q100,95 6,100 Z" fill="url(#pageR)"/>

    <!-- 书脊阴影 -->
    <path d="M-6,-95 Q0,-100 6,-95 L6,100 Q0,105 -6,100 Z" fill="#d4c4a8" opacity="0.6"/>

    <!-- 左页文字行 -->
    <g opacity="0.2">
      <rect x="-180" y="-70" width="100" height="2" rx="1" fill="#5c4a32"/>
      <rect x="-180" y="-55" width="155" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="-44" width="150" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="-33" width="145" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="-22" width="155" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="-11" width="140" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="0" width="150" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="11" width="148" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="22" width="142" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="33" width="155" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="44" width="135" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="55" width="150" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="66" width="140" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="-180" y="77" width="145" height="1.5" rx="1" fill="#8a7a62"/>
    </g>

    <!-- 右页文字行 -->
    <g opacity="0.2">
      <rect x="25" y="-70" width="90" height="2" rx="1" fill="#5c4a32"/>
      <rect x="25" y="-55" width="155" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="-44" width="148" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="-33" width="150" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="-22" width="142" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="-11" width="155" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="0" width="145" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="11" width="150" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="22" width="138" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="33" width="152" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="44" width="140" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="55" width="148" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="66" width="150" height="1.5" rx="1" fill="#8a7a62"/>
      <rect x="25" y="77" width="142" height="1.5" rx="1" fill="#8a7a62"/>
    </g>

    <!-- 书签丝带 -->
    <path d="M40,-95 L40,125 L35,115 L30,125 L30,-95" fill="#8b2020" opacity="0.7"/>
  </g>

  <!-- 十字架（圣经上方发光） -->
  <g transform="translate(600, 120)" filter="url(#glow)" opacity="0.15">
    <rect x="-3" y="-50" width="6" height="80" rx="2" fill="#c9a96e"/>
    <rect x="-22" y="-28" width="44" height="6" rx="2" fill="#c9a96e"/>
  </g>

  <!-- 装饰性圆环 -->
  <circle cx="600" cy="280" r="220" fill="none" stroke="#c9a96e" stroke-width="0.4" opacity="0.05"/>
  <circle cx="600" cy="280" r="260" fill="none" stroke="#c9a96e" stroke-width="0.3" opacity="0.03"/>
</svg>
