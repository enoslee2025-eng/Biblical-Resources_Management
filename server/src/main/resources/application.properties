# ========================================
# Quarkus 配置文件 - 主后端 API
# ========================================

# 服务端口
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# 数据库配置
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/bible_dictionary?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
quarkus.datasource.username=bible_dictionary
quarkus.datasource.password=bible_dictionary123

# Hibernate 配置
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# 请求体大小限制（导入圣经译本时内容较大）
quarkus.http.limits.max-body-size=50M

# CORS 配置
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*

# 日志配置
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.example".level=DEBUG
